name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js (Volta-pinned 22)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; the version bundled
      # with Node 22 is older, so upgrade before publishing.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Enable Corepack and pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate
          yarn --version

      - name: Restore Yarn cache
        uses: actions/cache@v6
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build

      - name: Verify tag matches package.json version
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $pkg_version" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # No NODE_AUTH_TOKEN: authentication is via OIDC trusted publishing,
      # configured on the npm package settings for this repo + workflow.
      # Idempotent: skip when this version is already on the registry so
      # re-running a tag (or tagging a manually-bootstrapped version) is green.
      - name: Publish to npm
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version is already published; skipping publish."
            exit 0
          fi
          npm publish --access public --provenance
